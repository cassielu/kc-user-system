<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>坐标解析 - 任意门</title>
</head>
<body>
<section>
    <!-- 页面标题栏 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h5 class="mb-1 fw-bold"><i class="bi bi-geo-alt-fill me-2 text-danger"></i>坐标逆地理编码</h5>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 small">
                    <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
                    <li class="breadcrumb-item active">坐标解析</li>
                </ol>
            </nav>
        </div>
    </div>

    <!-- 消息提示 -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light">
            <h6 class="mb-0"><i class="bi bi-input-cursor-text me-2"></i>坐标录入</h6>
        </div>
        <div class="card-body">
            <!-- 单个录入 -->
            <form th:action="@{/geo/reverse/single}" method="post" class="row g-3 mb-4">
                <div class="col-auto">
                    <label class="form-label small fw-semibold">经度</label>
                    <input type="number" step="0.000001" name="longitude" class="form-control form-control-sm" 
                           placeholder="例如：116.397428" required style="width:200px;">
                </div>
                <div class="col-auto">
                    <label class="form-label small fw-semibold">纬度</label>
                    <input type="number" step="0.000001" name="latitude" class="form-control form-control-sm" 
                           placeholder="例如：39.90923" required style="width:200px;">
                </div>
                <div class="col-auto d-flex align-items-end">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="bi bi-plus-lg me-1"></i>添加并解析
                    </button>
                </div>
            </form>

            <hr>

            <!-- 批量导入 -->
            <form th:action="@{/geo/reverse/import}" method="post" enctype="multipart/form-data" class="row g-3">
                <div class="col-auto">
                    <label class="form-label small fw-semibold">Excel 文件</label>
                    <input type="file" name="file" class="form-control form-control-sm" accept=".xlsx,.xls" required>
                    <div class="form-text">Excel 第1列=经度，第2列=纬度（不含表头）</div>
                </div>
                <div class="col-auto d-flex align-items-end">
                    <button type="submit" class="btn btn-warning btn-sm">
                        <i class="bi bi-upload me-1"></i>批量导入
                    </button>
                </div>
                <div class="col-auto d-flex align-items-end">
                    <a th:href="@{/geo/reverse/export}" class="btn btn-success btn-sm">
                        <i class="bi bi-download me-1"></i>导出 Excel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- 数据表格 -->
    <div class="card shadow-sm" id="recordsCard">
        <div class="card-header bg-light d-flex justify-content-between align-items-center">
            <h6 class="mb-0"><i class="bi bi-table me-2"></i>解析记录</h6>
            <div class="d-flex align-items-center gap-2">
                <span class="badge bg-secondary" id="recordsCount" th:text="${#lists.size(records)} + ' 条'"></span>
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="reloadRecords()">
                    <i class="bi bi-arrow-clockwise me-1"></i>刷新
                </button>
            </div>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover table-sm align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">批次号</th>
                        <th>ID</th>
                        <th>经度</th>
                        <th>纬度</th>
                        <th>省</th>
                        <th>市</th>
                        <th>区</th>
                        <th>详细地址</th>
                        <th>状态</th>
                        <th>创建时间</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${records}">
                        <td class="ps-3">
                            <code class="small" th:text="${r.batchNo}"></code>
                            <a th:href="@{/geo/reverse/export(batchNo=${r.batchNo})}" 
                               class="btn btn-sm btn-outline-success ms-1" 
                               title="导出该批次" onclick="event.stopPropagation();">
                                <i class="bi bi-download"></i>
                            </a>
                        </td>
                        <td th:text="${r.id}"></td>
                        <td><code class="small" th:text="${r.longitude}"></code></td>
                        <td><code class="small" th:text="${r.latitude}"></code></td>
                        <td th:text="${r.province}"></td>
                        <td th:text="${r.city}"></td>
                        <td th:text="${r.district}"></td>
                        <td class="text-muted small" th:text="${r.address}"></td>
                        <td>
                            <span th:if="${r.status == 0}" class="badge bg-secondary">待解析</span>
                            <span th:if="${r.status == 1}" class="badge bg-success">成功</span>
                            <span th:if="${r.status == 2}" class="badge bg-danger" th:title="${r.errorMsg}">失败</span>
                        </td>
                        <td class="small text-muted" th:text="${#temporals.format(r.createTime, 'HH:mm:ss')}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(records)}">
                        <td colspan="10" class="text-center text-muted py-4">暂无数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 刷新记录
        function reloadRecords() {
            var btn = event.target.closest('button');
            var icon = btn.querySelector('i');
            icon.classList.add('spin');
            btn.disabled = true;

            fetch('/geo/reverse/records')
                .then(response => response.json())
                .then(data => {
                    var tbody = document.querySelector('#recordsCard tbody');
                    var html = '';

                    if (data.length === 0) {
                        html = '<tr><td colspan="9" class="text-center text-muted py-4">暂无数据</td></tr>';
                    } else {
                        data.forEach(function(r) {
                            var statusBadge = '';
                            if (r.status === 0) {
                                statusBadge = '<span class="badge bg-secondary">待解析</span>';
                            } else if (r.status === 1) {
                                statusBadge = '<span class="badge bg-success">成功</span>';
                            } else {
                                statusBadge = '<span class="badge bg-danger" title="' + (r.errorMsg || '') + '">失败</span>';
                            }

                            var createTime = r.createTime ? r.createTime.substring(11, 19) : '';

                            html += '<tr>' +
                                '<td class="ps-3">' +
                                    '<code class="small">' + (r.batchNo || '') + '</code> ' +
                                    '<a href="/geo/reverse/export?batchNo=' + encodeURIComponent(r.batchNo || '') + '" class="btn btn-sm btn-outline-success ms-1" title="导出该批次">' +
                                        '<i class="bi bi-download"></i>' +
                                    '</a>' +
                                '</td>' +
                                '<td>' + r.id + '</td>' +
                                '<td><code class="small">' + r.longitude + '</code></td>' +
                                '<td><code class="small">' + r.latitude + '</code></td>' +
                                '<td>' + (r.province || '') + '</td>' +
                                '<td>' + (r.city || '') + '</td>' +
                                '<td>' + (r.district || '') + '</td>' +
                                '<td class="text-muted small">' + (r.address || '') + '</td>' +
                                '<td>' + statusBadge + '</td>' +
                                '<td class="small text-muted">' + createTime + '</td>' +
                                '</tr>';
                        });
                    }

                    tbody.innerHTML = html;
                    document.getElementById('recordsCount').textContent = data.length + ' 条';
                })
                .catch(err => {
                    console.error('刷新失败:', err);
                    alert('刷新失败，请稍后重试');
                })
                .finally(() => {
                    icon.classList.remove('spin');
                    btn.disabled = false;
                });
        }

        // 旋转动画
        var style = document.createElement('style');
        style.textContent = '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } } .spin { animation: spin 1s linear infinite; }';
        document.head.appendChild(style);
    </script>
</section>
</body>
</html>
