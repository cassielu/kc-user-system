<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑角色 - 任意门</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6fb; }
        .content-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 24px;
            max-width: 600px;
            margin: 0 auto;
        }
        .page-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e9ecef;
        }
        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        .form-label {
            font-weight: 500;
        }
        .action-bar {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 2px solid #e9ecef;
        }
    </style>
</head>
<body>
<div th:replace="~{layout :: layout(~{::title}, ~{::section})}">
    <title>编辑角色 - 任意门</title>
    <section class="content-card">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-pencil-square me-2"></i>编辑角色
            </h1>
        </div>

        <!-- 编辑表单 -->
        <form th:action="@{/role/edit}" method="post" th:object="${role}">
            <input type="hidden" th:field="*{id}">
            
            <div class="mb-3">
                <label class="form-label">角色名称 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{roleName}" required placeholder="例如: 运营人员">
            </div>

            <div class="mb-3">
                <label class="form-label">角色编码 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{roleCode}" required placeholder="例如: ROLE_OPERATOR">
                <div class="form-text">格式: ROLE_XXX，大写字母和下划线</div>
            </div>

            <div class="mb-3">
                <label class="form-label">状态</label>
                <select class="form-select" th:field="*{status}">
                    <option value="1">启用</option>
                    <option value="0">禁用</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">备注</label>
                <textarea class="form-control" th:field="*{remark}" rows="3" placeholder="角色说明"></textarea>
            </div>

            <!-- 操作按钮 -->
            <div class="action-bar">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle me-1"></i>保存
                </button>
                <a th:href="@{/role/list}" class="btn btn-secondary">
                    <i class="bi bi-x-circle me-1"></i>取消
                </a>
            </div>
        </form>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
