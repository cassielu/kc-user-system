<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分配权限 - 任意门</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6fb; }
        .content-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 24px;
        }
        .page-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #e9ecef;
        }
        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        .role-info {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 24px;
        }
        .menu-tree {
            max-height: 500px;
            overflow-y: auto;
            padding: 16px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
        }
        .tree-node {
            margin: 8px 0;
        }
        .tree-node.level-1 {
            margin-left: 0;
            font-weight: 600;
        }
        .tree-node.level-2 {
            margin-left: 30px;
        }
        .tree-node.level-3 {
            margin-left: 60px;
        }
        .form-check-label {
            cursor: pointer;
            user-select: none;
        }
        .menu-type-badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            margin-left: 8px;
        }
        .action-bar {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 2px solid #e9ecef;
        }
        .btn-select-all {
            margin-right: 8px;
        }
    </style>
</head>
<body>
<div th:replace="~{layout :: layout(~{::title}, ~{::section})}">
    <title>分配权限 - <span th:text="${role.roleName}"></span> - 任意门</title>
    <section class="content-card">
        <!-- CSRF Token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        
        <!-- 页面头部 -->
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-key-fill me-2"></i>分配权限
            </h1>
        </div>

        <!-- 角色信息 -->
        <div class="role-info">
            <div class="row">
                <div class="col-md-4">
                    <strong>角色名称:</strong> <span th:text="${role.roleName}"></span>
                </div>
                <div class="col-md-4">
                    <strong>角色编码:</strong> <code th:text="${role.roleCode}"></code>
                </div>
                <div class="col-md-4">
                    <strong>备注:</strong> <span th:text="${role.remark}"></span>
                </div>
            </div>
        </div>

        <!-- 权限选择 -->
        <h5 class="mb-3">
            <i class="bi bi-list-check me-2"></i>选择菜单权限
        </h5>
        
        <div class="mb-3">
            <button type="button" class="btn btn-sm btn-outline-primary btn-select-all" onclick="selectAll()">
                <i class="bi bi-check-square me-1"></i>全选
            </button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="selectNone()">
                <i class="bi bi-square me-1"></i>取消全选
            </button>
        </div>

        <div class="menu-tree" id="menuTree">
            <div th:each="menu : ${menuTree}" 
                 th:class="'tree-node level-' + (${menu.parentId == 0} ? '1' : (${menu.parentId == 1 or menu.parentId == 4} ? '2' : '3'))">
                <div class="form-check">
                    <input class="form-check-input menu-checkbox" 
                           type="checkbox" 
                           th:id="'menu-' + ${menu.id}"
                           th:value="${menu.id}"
                           th:checked="${menu.checked}">
                    <label class="form-check-label" th:for="'menu-' + ${menu.id}">
                        <span th:text="${menu.menuName}"></span>
                        <span th:if="${menu.menuType == 1}" class="badge bg-primary menu-type-badge">目录</span>
                        <span th:if="${menu.menuType == 2}" class="badge bg-success menu-type-badge">菜单</span>
                        <span th:if="${menu.menuType == 3}" class="badge bg-info menu-type-badge">按钮</span>
                        <small class="text-muted ms-2" th:text="'(' + ${menu.menuCode} + ')'"></small>
                    </label>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-bar">
            <button type="button" class="btn btn-primary" onclick="savePermissions()">
                <i class="bi bi-check-circle me-1"></i>保存权限
            </button>
            <a th:href="@{/role/list}" class="btn btn-secondary">
                <i class="bi bi-arrow-left me-1"></i>返回列表
            </a>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:inline="javascript">
    var roleId = [[${role.id}]];

    // 全选
    function selectAll() {
        document.querySelectorAll('.menu-checkbox').forEach(cb => {
            cb.checked = true;
        });
    }

    // 取消全选
    function selectNone() {
        document.querySelectorAll('.menu-checkbox').forEach(cb => {
            cb.checked = false;
        });
    }

    // 保存权限
    function savePermissions() {
        // 收集选中的菜单ID
        var menuIds = [];
        document.querySelectorAll('.menu-checkbox:checked').forEach(cb => {
            menuIds.push(parseInt(cb.value));
        });

        // 显示加载提示
        Swal.fire({
            title: '保存中...',
            text: '正在保存权限配置',
            allowOutsideClick: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        // 构建表单数据（包含CSRF Token）
        var formData = new URLSearchParams();
        menuIds.forEach(id => {
            formData.append('menuIds', id);
        });
        
        // 添加CSRF Token
        var csrfInput = document.querySelector('input[name="_csrf"]');
        if (csrfInput) {
            formData.append(csrfInput.name, csrfInput.value);
        }

        // 发送请求
        fetch('/role/permission/' + roleId, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData.toString()
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                Swal.fire({
                    icon: 'success',
                    title: '保存成功!',
                    text: '权限配置已更新,用户下次登录时生效',
                    confirmButtonText: '确定'
                }).then(() => {
                    window.location.href = '/role/list';
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: '保存失败!',
                    text: data.message
                });
            }
        })
        .catch(error => {
            Swal.fire({
                icon: 'error',
                title: '错误!',
                text: '网络请求失败: ' + error.message
            });
        });
    }
</script>
</body>
</html>
