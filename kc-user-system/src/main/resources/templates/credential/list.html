<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>接口凭据管理 - 任意门</title>
</head>
<body>
<section>
    <!-- 页面标题栏 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h5 class="mb-1 fw-bold"><i class="bi bi-key-fill me-2 text-warning"></i>接口凭据管理</h5>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 small">
                    <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
                    <li class="breadcrumb-item active">接口凭据</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/credential/add}" class="btn btn-warning btn-sm px-3">
            <i class="bi bi-plus-lg me-1"></i>新增凭据
        </a>
    </div>

    <!-- 搜索栏 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body py-3">
            <form th:action="@{/credential/list}" method="get" class="d-flex gap-2">
                <input type="text" class="form-control form-control-sm" name="keyword"
                       th:value="${keyword}" placeholder="搜索凭据名称 / accessKey / 备注..." style="max-width:350px;">
                <button type="submit" class="btn btn-outline-primary btn-sm px-3">
                    <i class="bi bi-search me-1"></i>搜索
                </button>
                <a th:href="@{/credential/list}" class="btn btn-outline-secondary btn-sm px-3">
                    <i class="bi bi-arrow-counterclockwise me-1"></i>重置
                </a>
            </form>
        </div>
    </div>

    <!-- 消息提示 -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-1"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 数据表格 -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>凭据名称</th>
                        <th>accessKey</th>
                        <th>请求地址</th>
                        <th>状态</th>
                        <th>备注</th>
                        <th>创建时间</th>
                        <th class="text-center" style="width:180px;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cred : ${pageResult.records}">
                        <td class="ps-3" th:text="${cred.id}"></td>
                        <td class="fw-semibold" th:text="${cred.name}"></td>
                        <td>
                            <code class="small" th:text="${cred.accessKey}"></code>
                        </td>
                        <td>
                            <span class="small text-muted" th:if="${#strings.isEmpty(cred.pushUrl)}">默认地址</span>
                            <code class="small" th:unless="${#strings.isEmpty(cred.pushUrl)}" th:text="${cred.pushUrl}"></code>
                        </td>
                        <td>
                            <span th:if="${cred.status == 1}" class="badge bg-success">启用</span>
                            <span th:if="${cred.status == 0}" class="badge bg-secondary">禁用</span>
                        </td>
                        <td class="text-muted small" th:text="${cred.remark}"></td>
                        <td class="small text-muted" th:text="${#temporals.format(cred.createTime, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm" role="group">
                                <a th:href="@{'/credential/edit/' + ${cred.id}}" class="btn btn-outline-primary" title="编辑">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <!-- 切换状态 -->
                                <button type="button" class="btn"
                                        th:classappend="${cred.status == 1} ? 'btn-outline-warning' : 'btn-outline-success'"
                                        th:title="${cred.status == 1} ? '禁用' : '启用'"
                                        th:onclick="'confirmToggle(' + ${cred.id} + ')'">
                                    <i class="bi" th:classappend="${cred.status == 1} ? 'bi-pause-fill' : 'bi-play-fill'"></i>
                                </button>
                                <button type="button" class="btn btn-outline-danger" title="删除"
                                        th:onclick="'confirmDelete(' + ${cred.id} + ')'">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                            <!-- 隐藏表单用于切换状态 -->
                            <form th:id="'toggleForm' + ${cred.id}" th:action="@{'/credential/toggle/' + ${cred.id}}" method="post" style="display:none;"></form>
                            <!-- 隐藏表单用于删除 -->
                            <form th:id="'deleteForm' + ${cred.id}" th:action="@{'/credential/delete/' + ${cred.id}}" method="post" style="display:none;"></form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pageResult.records)}">
                        <td colspan="8" class="text-center text-muted py-4">暂无数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 分页 -->
    <nav th:if="${pageResult.pages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/credential/list(page=${currentPage - 1}, keyword=${keyword})}">上一页</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(1, pageResult.pages)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/credential/list(page=${i}, keyword=${keyword})}" th:text="${i}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == pageResult.pages} ? 'disabled'">
                <a class="page-link" th:href="@{/credential/list(page=${currentPage + 1}, keyword=${keyword})}">下一页</a>
            </li>
        </ul>
    </nav>
</section>

<script>
    function confirmToggle(id) {
        if (confirm('确定要切换该凭据的启用状态吗？')) {
            document.getElementById('toggleForm' + id).submit();
        }
    }
    function confirmDelete(id) {
        if (confirm('确定要删除该凭据吗？此操作不可恢复！')) {
            document.getElementById('deleteForm' + id).submit();
        }
    }
</script>
</body>
</html>
