<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>新增接口凭据 - 任意门</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h5 class="mb-1 fw-bold"><i class="bi bi-key-fill me-2 text-warning"></i>新增接口凭据</h5>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 small">
                    <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/credential/list}">接口凭据</a></li>
                    <li class="breadcrumb-item active">新增</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/credential/list}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>返回列表
        </a>
    </div>

    <!-- 错误提示 -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-1"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm" style="max-width:600px;">
        <div class="card-body">
            <form th:action="@{/credential/add}" method="post" th:object="${credential}">
                <div class="mb-3">
                    <label class="form-label fw-semibold small">凭据名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="name" th:value="*{name}"
                           placeholder="例如：测试环境-美团" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small">accessKey <span class="text-danger">*</span></label>
                    <input type="text" class="form-control font-monospace" name="accessKey" th:value="*{accessKey}"
                           placeholder="例如：fc21380e7544216f" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small">secret（签名密钥） <span class="text-danger">*</span></label>
                    <input type="text" class="form-control font-monospace" name="secret" th:value="*{secret}"
                           placeholder="用于 MD5 签名的密钥" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small">请求地址（pushUrl）</label>
                    <input type="text" class="form-control font-monospace" name="pushUrl" th:value="*{pushUrl}"
                           placeholder="例如：http://candao-api-gateway.paas-qc-vpc.can-dao.com/api">
                    <div class="form-text">留空则使用系统默认地址</div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold small">备注</label>
                    <textarea class="form-control" name="remark" rows="2" th:text="*{remark}"
                              placeholder="可选，用于描述该凭据用途"></textarea>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning">
                        <i class="bi bi-check-lg me-1"></i>提交
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
