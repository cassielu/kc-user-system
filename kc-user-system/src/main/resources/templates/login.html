<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 任意门</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 400px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: none;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px 16px 0 0;
            padding: 30px;
            text-align: center;
        }
        .login-header h4 { margin: 0; font-size: 1.5rem; }
        .login-header p  { margin: 8px 0 0; opacity: 0.85; font-size: 0.9rem; }
        .login-body { padding: 30px; }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
        }
        .btn-login:hover { opacity: 0.9; }
        .form-control { border-radius: 8px; padding: 10px 14px; }
        .form-control:focus { border-color: #667eea; box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25); }
    </style>
</head>
<body>
<div class="card login-card">
    <div class="login-header">
        <h4>任意门</h4>
        <p>请输入账号和密码登录</p>
    </div>
    <div class="login-body">

        <!-- 登录失败：用户名或密码错误 -->
        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span>用户名或密码错误，请重试</span>
        </div>

        <!-- 登录失败：账号已被禁用 -->
        <div th:if="${param.disabled}" class="alert alert-warning d-flex align-items-center" role="alert">
            <i class="bi bi-slash-circle-fill me-2"></i>
            <span>该账号已被停用，请联系管理员</span>
        </div>

        <!-- 登出成功提示 -->
        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span>您已成功退出登录</span>
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">用户名</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="请输入用户名" autofocus required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">密码</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="请输入密码" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login text-white fw-semibold">
                登 录
            </button>
        </form>


    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
