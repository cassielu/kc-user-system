<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>新增用户 - 任意门</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h5 class="mb-1 fw-bold"><i class="bi bi-person-plus-fill me-2 text-primary"></i>新增用户</h5>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 small">
                    <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/user/list}">用户管理</a></li>
                    <li class="breadcrumb-item active">新增用户</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <!-- 错误提示 -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-transparent py-3">
                    <span class="fw-semibold text-muted small">填写用户基本信息</span>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/user/add}" method="post" th:object="${user}" id="addUserForm" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                用户名 <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="username" name="username"
                                   th:value="*{username}" placeholder="请输入用户名（唯一）" required>
                        </div>

                        <div class="mb-3">
                            <label for="realName" class="form-label fw-semibold">真实姓名</label>
                            <input type="text" class="form-control" id="realName" name="realName"
                                   th:value="*{realName}" placeholder="请输入真实姓名">
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label fw-semibold">手机号</label>
                            <input type="tel" class="form-control" id="phone" name="phone"
                                   th:value="*{phone}" placeholder="请输入手机号"
                                   pattern="^1[3-9]\d{9}$"
                                   title="请输入有效的手机号">
                            <div class="invalid-feedback">请输入有效的手机号</div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">&#37038;&#31665;</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   th:value="*{email}" placeholder="&#35831;&#36755;&#20837;&#37038;&#31665;&#22320;&#22336;">
                            <div class="invalid-feedback">&#35831;&#36755;&#20837;&#26377;&#25928;&#30340;&#37038;&#31665;&#22320;&#22336;</div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">
                                密码 <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="请输入密码（至少6位）" required minlength="6">
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label fw-semibold">
                                确认密码 <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                                   placeholder="请再次输入密码" required minlength="6">
                            <div class="invalid-feedback">两次输入的密码不一致</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">状态</label>
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status"
                                           id="statusEnabled" value="1" checked>
                                    <label class="form-check-label" for="statusEnabled">启用</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status"
                                           id="statusDisabled" value="0">
                                    <label class="form-check-label" for="statusDisabled">禁用</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-check-lg me-1"></i>保存
                            </button>
                            <a th:href="@{/user/list}" class="btn btn-secondary px-4">
                                <i class="bi bi-x-lg me-1"></i>取消
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    const form = document.getElementById('addUserForm');
    const pwd  = document.getElementById('password');
    const confirmPwd = document.getElementById('confirmPassword');

    // 实时校验：确认密码字段失焦时判断
    confirmPwd.addEventListener('blur', checkPasswordMatch);
    pwd.addEventListener('input', function () {
        if (confirmPwd.value) checkPasswordMatch();
    });

    function checkPasswordMatch() {
        if (pwd.value !== confirmPwd.value) {
            confirmPwd.classList.add('is-invalid');
            confirmPwd.classList.remove('is-valid');
        } else {
            confirmPwd.classList.remove('is-invalid');
            confirmPwd.classList.add('is-valid');
        }
    }

    // 提交前最终校验
    form.addEventListener('submit', function (e) {
        if (pwd.value !== confirmPwd.value) {
            e.preventDefault();
            confirmPwd.classList.add('is-invalid');
            confirmPwd.focus();
        }
    });
</script>
</body>
</html>
