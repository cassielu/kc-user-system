<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>用户管理 - 任意门</title>
</head>
<body>
<section>
    <!-- 页面标题栏 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h5 class="mb-1 fw-bold"><i class="bi bi-people-fill me-2 text-primary"></i>用户管理</h5>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 small">
                    <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
                    <li class="breadcrumb-item active">用户管理</li>
                </ol>
            </nav>
        </div>
        <a th:href="@{/user/add}" class="btn btn-primary btn-sm px-3">
            <i class="bi bi-plus-lg me-1"></i>新增用户
        </a>
    </div>

    <!-- 搜索栏 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body py-3">
            <form th:action="@{/user/list}" method="get" class="d-flex gap-2">
                <input type="text" class="form-control form-control-sm" name="keyword"
                       th:value="${keyword}" placeholder="搜索用户名或姓名..." style="max-width:300px;">
                <button type="submit" class="btn btn-outline-primary btn-sm px-3">
                    <i class="bi bi-search me-1"></i>搜索
                </button>
                <a th:href="@{/user/list}" class="btn btn-outline-secondary btn-sm px-3">
                    <i class="bi bi-arrow-counterclockwise me-1"></i>重置
                </a>
            </form>
        </div>
    </div>

    <!-- 用户列表表格 -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4" style="width:80px">#</th>
                        <th>用户名</th>
                        <th>真实姓名</th>
                        <th>手机号</th>
                        <th>&#37038;&#31665;</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th class="text-center" style="width:180px">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${pageResult.records.isEmpty()}">
                        <td colspan="8" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-3 d-block mb-2"></i>暂无用户数据
                        </td>
                    </tr>
                    <tr th:each="user, stat : ${pageResult.records}">
                        <td class="ps-4 text-muted small"
                            th:text="${(pageResult.current - 1) * pageResult.size + stat.count}">1</td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center"
                                     style="width:32px;height:32px;font-size:0.8rem;"
                                     th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">A</div>
                                <span th:text="${user.username}" class="fw-semibold"></span>
                            </div>
                        </td>
                        <td th:text="${user.realName ?: '-'}">-</td>
                        <td th:text="${user.phone ?: '-'}" class="text-muted small">-</td>
                        <td th:text="${user.email ?: '-'}" class="text-muted small">-</td>
                        <td>
                            <span th:if="${user.status == 1}" class="badge bg-success-subtle text-success border border-success-subtle">启用</span>
                            <span th:if="${user.status == 0}" class="badge bg-danger-subtle text-danger border border-danger-subtle">禁用</span>
                        </td>
                        <td th:text="${#temporals.format(user.createTime, 'yyyy-MM-dd HH:mm')}" class="text-muted small">-</td>
                        <td class="text-center">
                            <a th:href="@{/user/edit/{id}(id=${user.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil-fill"></i>
                            </a>
                            <!-- 停用 / 启用 按鈕 -->
                            <button type="button"
                                    th:class="${user.status == 1} ? 'btn btn-sm btn-outline-warning me-1' : 'btn btn-sm btn-outline-success me-1'"
                                    th:data-id="${user.id}"
                                    th:data-name="${user.username}"
                                    th:data-action="${user.status == 1 ? '停用' : '启用'}"
                                    onclick="confirmToggle(this)">
                                <i th:class="${user.status == 1} ? 'bi bi-pause-circle' : 'bi bi-play-circle'"></i>
                                <span th:text="${user.status == 1} ? '停用' : '启用'"></span>
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                    th:data-id="${user.id}"
                                    th:data-name="${user.username}"
                                    onclick="confirmDelete(this)">
                                <i class="bi bi-trash-fill"></i>
                            </button>
                            <!-- 切换状态表单 -->
                            <form th:id="'toggle-form-' + ${user.id}"
                                  th:action="@{/user/toggle/{id}(id=${user.id})}"
                                  method="post" class="d-none">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            </form>
                            <!-- 删除表单 -->
                            <form th:id="'del-form-' + ${user.id}"
                                  th:action="@{/user/delete/{id}(id=${user.id})}"
                                  method="post" class="d-none">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- 分页 -->
        <div class="card-footer d-flex justify-content-between align-items-center py-3"
             th:if="${pageResult.pages > 0}">
            <span class="text-muted small">
                共 <strong th:text="${pageResult.total}">0</strong> 条，
                第 <strong th:text="${pageResult.current}">1</strong> /
                <strong th:text="${pageResult.pages}">1</strong> 页
            </span>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${pageResult.current <= 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/user/list(page=${pageResult.current - 1}, keyword=${keyword})}">上一页</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, pageResult.pages)}"
                        th:classappend="${i == pageResult.current} ? 'active'">
                        <a class="page-link" th:href="@{/user/list(page=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${pageResult.current >= pageResult.pages} ? 'disabled'">
                        <a class="page-link" th:href="@{/user/list(page=${pageResult.current + 1}, keyword=${keyword})}">下一页</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- 停用/启用确认模态框 -->
    <div class="modal fade" id="toggleModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h6 class="modal-title fw-bold" id="toggleModalTitle"></h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-muted" id="toggleModalBody"></div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-sm" id="confirmToggleBtn">确认</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h6 class="modal-title fw-bold"><i class="bi bi-exclamation-triangle-fill text-warning me-2"></i>确认删除</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-muted">
                    确定要删除用户 <strong id="deleteUserName" class="text-dark"></strong> 吗？此操作不可恢复。
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger btn-sm" id="confirmDeleteBtn">确认删除</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let deleteFormId = null;
        let toggleFormId = null;

        /* 停用 / 启用确认 */
        function confirmToggle(btn) {
            const action = btn.dataset.action;
            const name   = btn.dataset.name;
            toggleFormId  = 'toggle-form-' + btn.dataset.id;

            const isDisable = action === '停用';
            document.getElementById('toggleModalTitle').innerHTML =
                '<i class="bi ' + (isDisable ? 'bi-pause-circle-fill text-warning' : 'bi-play-circle-fill text-success') + ' me-2"></i>' + action + '用户';
            document.getElementById('toggleModalBody').innerHTML =
                '确定要将用户 <strong class="text-dark">' + name + '</strong> ' + action + '吗？';

            const confirmBtn = document.getElementById('confirmToggleBtn');
            confirmBtn.className = isDisable ? 'btn btn-warning btn-sm' : 'btn btn-success btn-sm';
            confirmBtn.textContent = '确认' + action;

            // 懒初始化：确保 Bootstrap 已加载后再创建 Modal
            bootstrap.Modal.getOrCreateInstance(document.getElementById('toggleModal')).show();
        }

        document.getElementById('confirmToggleBtn').addEventListener('click', function () {
            if (toggleFormId) {
                bootstrap.Modal.getInstance(document.getElementById('toggleModal')).hide();
                document.getElementById(toggleFormId).submit();
            }
        });

        /* 删除确认 */
        function confirmDelete(btn) {
            deleteFormId = 'del-form-' + btn.dataset.id;
            document.getElementById('deleteUserName').textContent = btn.dataset.name;
            bootstrap.Modal.getOrCreateInstance(document.getElementById('deleteModal')).show();
        }

        document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
            if (deleteFormId) {
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                document.getElementById(deleteFormId).submit();
            }
        });
    </script>
</section>
</body>
</html>
