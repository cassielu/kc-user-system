<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>编辑用户 - KC 用户管理系统</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h5 class="mb-1 fw-bold"><i class="bi bi-person-gear me-2 text-primary"></i>编辑用户</h5>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0 small">
                    <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/user/list}">用户管理</a></li>
                    <li class="breadcrumb-item active">编辑用户</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-transparent py-3">
                    <span class="fw-semibold text-muted small">
                        修改用户信息（密码留空则不修改）
                    </span>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/user/edit}" method="post" th:object="${user}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="id" th:value="*{id}"/>

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">用户名</label>
                            <input type="text" class="form-control" id="username"
                                   th:value="*{username}" disabled>
                            <div class="form-text">用户名不可修改</div>
                        </div>

                        <div class="mb-3">
                            <label for="realName" class="form-label fw-semibold">真实姓名</label>
                            <input type="text" class="form-control" id="realName" name="realName"
                                   th:value="*{realName}" placeholder="请输入真实姓名">
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label fw-semibold">手机号</label>
                            <input type="tel" class="form-control" id="phone" name="phone"
                                   th:value="*{phone}" placeholder="请输入手机号"
                                   pattern="^1[3-9]\d{9}$">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">&#37038;&#31665;</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   th:value="*{email}" placeholder="&#35831;&#36755;&#20837;&#37038;&#31665;&#22320;&#22336;">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">新密码</label>
                            <input type="password" class="form-control" id="password" name="password"
                                   th:value="*{password}" placeholder="留空则不修改密码">
                            <div class="form-text">如需修改密码请输入新密码，否则留空</div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">状态</label>
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status"
                                           id="statusEnabled" value="1"
                                           th:checked="*{status == 1}">
                                    <label class="form-check-label" for="statusEnabled">启用</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="status"
                                           id="statusDisabled" value="0"
                                           th:checked="*{status == 0}">
                                    <label class="form-check-label" for="statusDisabled">禁用</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="bi bi-check-lg me-1"></i>保存修改
                            </button>
                            <a th:href="@{/user/list}" class="btn btn-secondary px-4">
                                <i class="bi bi-x-lg me-1"></i>取消
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
